<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj360View</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* NAVBAR */
.navbar {
    position: absolute;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 20px;
    z-index: 10;
}

/* SLIDER */
.slider {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* TEXT */
.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
}

.overlay h1 {
    font-size: 50px;
}

.overlay p {
    font-size: 20px;
}

.btn {
    background: gold;
    color: black;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 30px;
    display: inline-block;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Raj360View</h2>
</div>

<!-- SLIDER -->
<div class="slider">

    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1566073771259-6a8506099945')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c')"></div>

    <div class="overlay">
        <h1>360° Virtual Tour Services</h1>
        <p>Google Street View Trusted Photographer | 1000+ Shoots</p>
        <a href="#contact" class="btn">Book Now</a>
    </div>

</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 4000);
</script>

</body>
</html>
